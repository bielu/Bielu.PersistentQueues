name: Weekly Performance Benchmark

on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 02:00 UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore src/Bielu.PersistentQueues.Benchmarks/Bielu.PersistentQueues.Benchmarks.csproj

    - name: Build benchmarks
      run: dotnet build src/Bielu.PersistentQueues.Benchmarks/Bielu.PersistentQueues.Benchmarks.csproj -c Release --no-restore

    - name: Run regression benchmarks
      run: |
        dotnet run --project src/Bielu.PersistentQueues.Benchmarks/Bielu.PersistentQueues.Benchmarks.csproj \
          -c Release --no-build -- \
          --filter "*RegressionBenchmark*" \
          --exporters json \
          --artifacts ./BenchmarkDotNet.Artifacts

    - name: Store results to GitHub Pages
      uses: benchmark-action/github-action-benchmark@v1
      with:
        name: Regression Benchmarks
        tool: 'benchmarkdotnet'
        output-file-path: ./BenchmarkDotNet.Artifacts/results/Bielu.PersistentQueues.Benchmarks.RegressionBenchmark-report-full-compressed.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        gh-pages-branch: gh-pages
        benchmark-data-dir-path: benchmarks
        comment-on-alert: false
        alert-threshold: '200%'
        max-items-in-chart: 50

    - name: Upload benchmark results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: benchmark-weekly-${{ github.run_number }}
        path: ./BenchmarkDotNet.Artifacts/results/
        retention-days: 365

    - name: Generate summary report
      if: always()
      run: |
        echo "# 📊 Weekly Performance Benchmark" > $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Date:** $(date -u)" >> $GITHUB_STEP_SUMMARY
        echo "**Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Results have been added to the performance tracking dashboard." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📈 **View trends:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/dev/bench/" >> $GITHUB_STEP_SUMMARY
