name: Performance Benchmark on PR

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/Bielu.PersistentQueues/**'
      - 'src/Bielu.PersistentQueues.Storage.*/**'
      - 'src/Bielu.PersistentQueues.Benchmarks/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore src/Bielu.PersistentQueues.Benchmarks/Bielu.PersistentQueues.Benchmarks.csproj

    - name: Build benchmarks
      run: dotnet build src/Bielu.PersistentQueues.Benchmarks/Bielu.PersistentQueues.Benchmarks.csproj -c Release --no-restore

    - name: Run regression benchmarks
      run: |
        dotnet run --project src/Bielu.PersistentQueues.Benchmarks/Bielu.PersistentQueues.Benchmarks.csproj \
          -c Release --no-build -- \
          --filter "*RegressionBenchmark*" \
          --exporters fulljson \
          --artifacts ./BenchmarkDotNet.Artifacts

    - name: Download baseline
      id: download-baseline
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: benchmark-baseline
        path: ./baseline

    - name: Compare with baseline
      if: steps.download-baseline.outcome == 'success'
      id: compare
      run: |
        # Install ResultsComparer tool if not present
        dotnet tool install -g BenchmarkDotNet.ResultsComparer || true

        # Compare current results with baseline
        dotnet-results-comparer \
          --base ./baseline \
          --diff ./BenchmarkDotNet.Artifacts/results/*.json \
          --threshold 10% \
          --output ./comparison.md || echo "No significant changes"

    - name: Comment PR with results
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          let comment = '## 📊 Performance Benchmark Results\n\n';

          // Add comparison if available
          if (fs.existsSync('./comparison.md')) {
            const comparison = fs.readFileSync('./comparison.md', 'utf8');
            comment += '### Comparison with Baseline\n\n';
            comment += comparison;
          } else {
            comment += '_No baseline available for comparison. This will be created after merge._\n';
          }

          // Add raw results summary
          const resultsPath = './BenchmarkDotNet.Artifacts/results';
          if (fs.existsSync(resultsPath)) {
            comment += '\n\n### Latest Results\n\n';
            comment += 'Benchmark artifacts have been generated. ';
            comment += 'Review the full results in the workflow artifacts.\n';
          }

          // Find existing comment or create new
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const botComment = comments.find(comment =>
            comment.user.type === 'Bot' &&
            comment.body.includes('📊 Performance Benchmark Results')
          );

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: comment
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
          }

    - name: Check for regressions
      if: steps.compare.outcome == 'success'
      run: |
        # Fail the build if there are significant performance regressions
        if grep -q "slower" ./comparison.md; then
          echo "⚠️ Performance regression detected!"
          echo "Review the comparison above to see which benchmarks regressed."
          exit 1
        fi

    - name: Upload benchmark results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: benchmark-results-pr-${{ github.event.pull_request.number }}
        path: ./BenchmarkDotNet.Artifacts/results/
        retention-days: 90
